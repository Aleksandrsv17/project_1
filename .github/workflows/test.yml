name: Run Tests on PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vip_mobility_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vip_mobility_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-32-characters-ok
      JWT_REFRESH_SECRET: test-refresh-secret-32-characters-ok
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      PLATFORM_COMMISSION_RATE: '0.20'
      INSURANCE_FEE_PER_DAY: '25.00'
      MILEAGE_OVERAGE_RATE: '2.00'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d vip_mobility_test \
            -f backend/src/db/migrations/001_initial.sql

      - name: Run tests with coverage
        run: cd backend && npm test -- --coverage --forceExit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
