name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run tests
        run: cd backend && npm test -- --passWithNoTests --forceExit

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 120s
          script: |
            set -e
            APP_DIR="/var/www/vip-mobility/backend"

            echo "=== Pulling latest code ==="
            cd $APP_DIR
            # Sync files from GitHub Actions runner via rsync alternative
            # (files are deployed by overwriting on the server directly)

            echo "=== Installing dependencies ==="
            npm install

            echo "=== Building TypeScript ==="
            npx tsc --skipLibCheck

            echo "=== Restarting PM2 ==="
            pm2 restart ecosystem.config.js --env production
            pm2 save

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost:3000/health
            echo " - Deploy complete"

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to 109.120.133.113 SUCCESSFUL"
          else
            echo "❌ Deployment FAILED — check logs"
            exit 1
          fi
